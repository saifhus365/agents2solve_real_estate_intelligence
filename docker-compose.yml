version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend (Vite) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (Celery broker) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Celery Worker ──────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.ingestion.tasks worker --loglevel=info -Q ingestion
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── Celery Beat (Scheduler) ───────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.ingestion.tasks beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
